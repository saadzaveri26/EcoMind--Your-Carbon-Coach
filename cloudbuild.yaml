steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyC8A7DQcdhZRqgwnoWu-BImskqIo13dmM8'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=ecomind-carbon-coach.firebaseapp.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=ecomind-carbon-coach'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=1:903694242938:web:317cb9bf166cc7323257c3'
      - '-t'
      - 'asia-south1-docker.pkg.dev/amd-hackathon-493310/ecomind/ecomind-app:latest'
      - '.'

  # Step 2: Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "asia-south1-docker.pkg.dev/amd-hackathon-493310/ecomind/ecomind-app:latest"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "ecomind"
      - "--image=asia-south1-docker.pkg.dev/amd-hackathon-493310/ecomind/ecomind-app:latest"
      - "--region=us-central1"
      - "--project=amd-hackathon-493310"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=3080"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest"

  # Step 4: Add IAM policy binding to ensure public access (preventing 403 Forbidden)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "add-iam-policy-binding"
      - "ecomind"
      - "--region=us-central1"
      - "--project=amd-hackathon-493310"
      - "--member=allUsers"
      - "--role=roles/run.invoker"

options:
  logging: CLOUD_LOGGING_ONLY
